name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

env:
    NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
    NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ci-placeholder-publishable-key
    NEXTAUTH_SECRET: ci-placeholder-secret
    NEXTAUTH_URL: http://localhost:3000

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: adun_elearn_ci
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        env:
            DATABASE_URL: postgresql://postgres:postgres@localhost:5432/adun_elearn_ci
            DIRECT_URL: postgresql://postgres:postgres@localhost:5432/adun_elearn_ci
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Type check
              run: npm run typecheck

            - name: Format check
              run: npm run format:check

            - name: Sync database schema
              run: npx prisma db push --skip-generate

            - name: Unit tests
              run: npm run test

            - name: Build
              run: npm run build

    e2e:
        runs-on: ubuntu-latest
        needs: build-and-test
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: adun_elearn_ci
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        env:
            DATABASE_URL: postgresql://postgres:postgres@localhost:5432/adun_elearn_ci
            DIRECT_URL: postgresql://postgres:postgres@localhost:5432/adun_elearn_ci
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Sync database schema
              run: npx prisma db push --skip-generate

            - name: Seed database
              run: npx prisma db seed

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Run e2e tests
              run: npm run test:e2e
              env:
                  CI: true

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 14
